<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter - My Tool</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; text-align: center; color: #333; background-color: #fafafa; }
        .container { max-width: 600px; margin: 50px auto; padding: 30px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #222; margin-bottom: 10px; }
        textarea { width: 100%; height: 180px; padding: 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
        .footer-section { margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee; }
        .btn-group { display: flex; justify-content: center; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
        .btn { padding: 10px 18px; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
        .btn-tmn { background-color: #ff8c00; color: white; }
        .btn-gh { background-color: #24292e; color: white; }
        .logo { width: 22px; height: 22px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>เครื่องมือนับตัวอักษร</h1>
        <p style="color: #666; margin-bottom: 25px;">เช็คจำนวนตัวอักษรและช่องว่างได้ง่ายๆ ในที่เดียว</p>
        
        <textarea id="userInput" placeholder="วางข้อความที่นี่..."></textarea>
        <p style="font-size: 18px;">จำนวนตัวอักษร: <span id="count" style="font-weight: bold; color: #ff8c00;">0</span></p>

        <div class="footer-section">
            <p style="font-size: 14px; color: #777;">ชื่นชอบเครื่องมือนี้? สนับสนุนนักพัฒนาหรือติดตามผลงานได้ที่ลิงก์ด้านล่าง</p>
            
            <div class="btn-group">
                <a href="https://tmn.app.link/27Veyr09l1b" target="_blank" class="btn btn-tmn">
                    <img src="https://www.truemoney.com/wp-content/uploads/2020/12/truemoneywallet-logo-variant.png" class="logo" alt="TrueMoney">
                    สนับสนุนค่าขนม
                </a>

                <a href="https://github.com/yosora62-yoho" target="_blank" class="btn btn-gh">
                    <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" class="logo" style="filter: invert(1);" alt="GitHub">
                    ติดตามบน GitHub
                </a>
            </div>
            <p style="font-size: 11px; color: #ccc; margin-top: 30px;">© 2026 Developed by yosora62-yoho</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
