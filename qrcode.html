<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สร้าง QR Code สีสันสดใส ฟรี - yosora62-yoho</title>
    <meta name="description" content="เครื่องมือสร้าง QR Code ออนไลน์ฟรี ปรับแต่งสีได้ ใช้งานง่าย ไม่มีวันหมดอายุ">
    <link rel="stylesheet" href="qr-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <a href="https://tmn.app.link/27Veyr09l1b" target="_blank" class="donate-corner">
        <img src="https://www.truemoney.com/wp-content/uploads/2020/12/truemoneywallet-logo-variant.png" class="tmn-icon" alt="TMN">
        สนับสนุนคอมเครื่องใหม่
    </a>

    <div class="container">
        <h1>สร้าง QR Code</h1>
        <p class="subtitle">วางลิงก์ของคุณเพื่อสร้างสีสันให้ QR Code ทันที</p>
        
        <input type="text" id="qrInput" placeholder="วางลิงก์ของคุณที่นี่..." autocomplete="off">
        
        <div id="qrcode-wrapper">
            <div id="qrcode-canvas"></div>
        </div>
        
        <div class="btn-group">
            <button id="downloadBtn" class="btn btn-save">บันทึกรูปภาพ (PNG)</button>
            <a href="index.html" class="btn btn-back">กลับหน้านับคำ</a>
        </div>

        <div class="footer-section">
            <p>© 2026 Developed with ❤️ by yosora62-yoho</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="qr-script.js"></script>
</body>
</html>
